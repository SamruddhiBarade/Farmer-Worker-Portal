<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgroConnect — Connecting Agriculture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-deep: #1a3d1f;
      --green-mid: #2d6a30;
      --green-light: #4a9e50;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--green-deep);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    /* Ambient background blobs */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 20%, rgba(74,158,80,0.25) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 80%, rgba(200,168,75,0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 100%, rgba(45,106,48,0.3) 0%, transparent 50%);
      pointer-events: none;
    }

    /* Decorative grain texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* LOGO BADGE */
    .logo-badge {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--green-mid), var(--green-light));
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      box-shadow: 0 12px 32px rgba(45,106,48,0.45);
      margin-bottom: 24px;
      animation: floatBadge 4s ease-in-out infinite;
    }
    @keyframes floatBadge {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    /* HEADLINE */
    .headline {
      font-family: 'Playfair Display', serif;
      color: white;
      font-size: 38px;
      font-weight: 700;
      text-align: center;
      line-height: 1.2;
      margin-bottom: 12px;
    }
    .headline span {
      background: linear-gradient(90deg, #a8d5a2, #f0d98a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtext {
      color: rgba(255,255,255,0.55);
      font-size: 16px;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 44px;
      max-width: 340px;
    }

    /* ROLE CARDS */
    .roles { display: flex; flex-direction: column; gap: 14px; width: 100%; }

    .role-card {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 20px 24px;
      border-radius: 18px;
      cursor: pointer;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .role-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.25s;
    }
    .role-card:hover {
      transform: translateY(-3px);
      border-color: rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      box-shadow: 0 16px 40px rgba(0,0,0,0.25);
    }
    .role-card:hover::before { opacity: 1; }
    .role-card:active { transform: translateY(0); }

    /* Card accent colors */
    .role-card.farmer { border-left: 4px solid #5a9e3c; }
    .role-card.farmer:hover { box-shadow: 0 16px 40px rgba(90,158,60,0.2); }

    .role-card.worker { border-left: 4px solid #f59f00; }
    .role-card.worker:hover { box-shadow: 0 16px 40px rgba(245,159,0,0.2); }

    .role-card.coordinator { border-left: 4px solid #5c6bc0; }
    .role-card.coordinator:hover { box-shadow: 0 16px 40px rgba(92,107,192,0.2); }

    .role-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
    }
    .farmer  .role-icon { background: rgba(90,158,60,0.2); }
    .worker  .role-icon { background: rgba(245,159,0,0.2); }
    .coordinator .role-icon { background: rgba(92,107,192,0.2); }

    .role-text { flex: 1; }
    .role-title {
      font-size: 17px;
      font-weight: 700;
      color: white;
      margin-bottom: 3px;
    }
    .role-desc {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
    }

    .role-arrow {
      color: rgba(255,255,255,0.3);
      font-size: 20px;
      transition: transform 0.2s, color 0.2s;
    }
    .role-card:hover .role-arrow {
      transform: translateX(4px);
      color: rgba(255,255,255,0.7);
    }

    /* FOOTER */
    .footer {
      margin-top: 40px;
      color: rgba(255,255,255,0.25);
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="wrapper">

  <div class="logo-badge">🌱</div>

  <h1 class="headline">Welcome to<br><span>AgroConnect</span></h1>
  <p class="subtext">Bridging farmers, workers, and coordinators across rural communities</p>

  <div class="roles">
    <a class="role-card farmer" href="farmer.html">
      <div class="role-icon">👨‍🌾</div>
      <div class="role-text">
        <div class="role-title">Farmer</div>
        <div class="role-desc">Post jobs and hire local farm workers</div>
      </div>
      <div class="role-arrow">›</div>
    </a>

    <a class="role-card worker" href="worker.html">
      <div class="role-icon">👷</div>
      <div class="role-text">
        <div class="role-title">Worker</div>
        <div class="role-desc">Find agricultural work near you</div>
      </div>
      <div class="role-arrow">›</div>
    </a>

    <a class="role-card coordinator" href="coordinator.html">
      <div class="role-icon">🧑‍💼</div>
      <div class="role-text">
        <div class="role-title">Coordinator</div>
        <div class="role-desc">Monitor and manage all job listings</div>
      </div>
      <div class="role-arrow">›</div>
    </a>
  </div>

  <div class="footer">© 2025 AgroConnect · Empowering Rural Agriculture</div>
</div>
</body>
</html>
